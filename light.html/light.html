<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light</title>
    <style>
    .all{
        display: grid;
        grid-template-columns: auto auto auto;
        align-items: center;
        justify-content: center;
        gap: 20px;
    }

    button{
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 50px;
        width: 90px;
        border-style: groove       ;
    }

    #onn{
         background-color: green;
        color: white;
            
    }
    #off{
        background-color: red;
        color: white;
    }
    #bulb{
        display: block;
        width: 300px;
        height: 550px;
        object-fit: contain;
        object-position: center;
    }
    </style>
</head>
<body>
    <div class="all">
        <button id="off" onclick="lightOff()">OFF</button>
        <img id="bulb" src="lightoff.png" alt="light off">
        <button id="onn" onclick="lighton()">ON</button>
    </div>
    <script>
    function lightOff(){
        document.getElementById("bulb").src ="lightoff.png";
    }
    function lighton(){
        document.getElementById("bulb").src ="lighton.png";
    }
    </script>
</body>
</html>
